# =============================================================================
# Primary local backend: self-hosted Appwrite (vendored under infra/appwrite/).
# Same stack pattern you can run on a VPS; this file is the local entrypoint.
# Traefik exposes HTTP on host port 8080 → Appwrite API/Console (e.g. /v1).
# Orientation: docs/ENTWICKLER_HANDBUCH.md, infra/appwrite/README.md
#
# First run:
#   cp infra/appwrite/.env.example infra/appwrite/.env
#   # edit secrets (_APP_DB_*, _APP_OPENSSL_KEY_V1, etc.)
#
# Start:  docker compose --env-file infra/appwrite/.env up -d
# Stop:   docker compose down
#
# Legacy Postgres + Hasura console + Lucia auth:
#   docker compose -f docker-compose.legacy.yml --profile local-dev up -d --build
#   npm run docker:local-dev:up
# =============================================================================

name: scriptony

include:
  - path: infra/appwrite/docker-compose.yml
