name: scriptony CI/CD with Deployment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bun run lint || true
        continue-on-error: true

      - name: Run TypeScript check
        run: bun run typecheck || true
        continue-on-error: true

      - name: Run tests
        run: bun run test -- --passWithNoTests || true
        continue-on-error: true

      - name: Build
        run: bun run build

  deploy-prod:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to production server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          echo "🚀 Deploying to PRODUCTION..."
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "
            set -e
            cd /root/scriptony-prod || (mkdir -p /root/scriptony-prod && cd /root/scriptony-prod && git clone git@github.com:iamthamanic/scriptonyapp.git .)
            git pull origin main
            umask 077
            printf '%s\n' \
              'DATABASE_URL=${{ secrets.DATABASE_URL }}' \
              'JWT_SECRET=${{ secrets.JWT_SECRET }}' \
              'MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}' \
              'DOMAIN=${{ secrets.DOMAIN }}' \
              'POSTGRES_DB=scriptony' \
              > .env
            docker compose down || true
            docker compose up -d --build
            docker system prune -f || true
            echo '✅ Production deployment complete!'
          "

  deploy-test:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to test server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          echo "🧪 Deploying to TEST environment..."
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "
            set -e
            cd /root/scriptony-test || (mkdir -p /root/scriptony-test && cd /root/scriptony-test && git clone -b develop git@github.com:iamthamanic/scriptonyapp.git .)
            git pull origin develop
            umask 077
            printf '%s\n' \
              'DATABASE_URL=${{ secrets.DATABASE_URL }}' \
              'JWT_SECRET=${{ secrets.JWT_SECRET }}' \
              'MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}' \
              'DOMAIN=test.scriptony.raccoova.com' \
              'POSTGRES_DB=scriptony_test' \
              > .env
            sed -i 's/scriptony_postgres/scriptony_postgres_test/g' docker-compose.yml || true
            sed -i 's/scriptony-minio/scriptony-minio-test/g' docker-compose.yml || true
            docker compose down || true
            docker compose up -d --build
            docker system prune -f || true
            echo '✅ Test deployment complete!'
          "
