# One-time migration: Supabase → Nhost (DB + optional Storage).
# Run manually from Actions tab. Secrets are taken from GitHub repo secrets.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#   NHOST_GRAPHQL_URL, NHOST_ADMIN_SECRET
#   USER_ID_MAPPING_JSON   (JSON string: {"supabase-uuid":"nhost-uuid",...})
# For storage migration also: NHOST_STORAGE_URL
#
# Repo root = Scriptonyapp (package.json and scripts/ at root). For monorepos, add: defaults.run.working-directory: Scriptonyapp

name: Migrate Supabase to Nhost

on:
  workflow_dispatch:
    inputs:
      run_db:
        description: "Run DB migration"
        required: true
        default: true
        type: boolean
      run_storage:
        description: "Run Storage migration (after DB)"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Dry run (no writes)"
        required: false
        default: false
        type: boolean

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install (if needed)
        run: npm ci 2>/dev/null || npm install
        continue-on-error: true

      - name: DB migration
        if: inputs.run_db && !inputs.dry_run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NHOST_GRAPHQL_URL: ${{ secrets.NHOST_GRAPHQL_URL }}
          NHOST_ADMIN_SECRET: ${{ secrets.NHOST_ADMIN_SECRET }}
          USER_ID_MAPPING_JSON: ${{ secrets.USER_ID_MAPPING_JSON }}
        run: node scripts/migrate-supabase-to-nhost.js

      - name: DB migration (dry run)
        if: inputs.run_db && inputs.dry_run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NHOST_GRAPHQL_URL: ${{ secrets.NHOST_GRAPHQL_URL }}
          NHOST_ADMIN_SECRET: ${{ secrets.NHOST_ADMIN_SECRET }}
          USER_ID_MAPPING_JSON: ${{ secrets.USER_ID_MAPPING_JSON }}
        run: node scripts/migrate-supabase-to-nhost.js --dry-run

      - name: Storage migration
        if: inputs.run_storage && !inputs.dry_run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NHOST_GRAPHQL_URL: ${{ secrets.NHOST_GRAPHQL_URL }}
          NHOST_ADMIN_SECRET: ${{ secrets.NHOST_ADMIN_SECRET }}
          NHOST_STORAGE_URL: ${{ secrets.NHOST_STORAGE_URL }}
        run: node scripts/migrate-supabase-storage-to-nhost.js

      - name: Storage migration (dry run)
        if: inputs.run_storage && inputs.dry_run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NHOST_GRAPHQL_URL: ${{ secrets.NHOST_GRAPHQL_URL }}
          NHOST_ADMIN_SECRET: ${{ secrets.NHOST_ADMIN_SECRET }}
          NHOST_STORAGE_URL: ${{ secrets.NHOST_STORAGE_URL }}
        run: node scripts/migrate-supabase-storage-to-nhost.js --dry-run
