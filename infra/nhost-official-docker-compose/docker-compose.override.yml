# Drop-in for Nhost upstream: examples/docker-compose
# Place next to docker-compose.yaml (same directory), then: docker compose up -d
# Merges with the official compose file; only overrides auth redirect / client URL.

services:
  auth:
    environment:
      AUTH_ACCESS_CONTROL_ALLOWED_REDIRECT_URLS: "http://localhost:3000,http://127.0.0.1:3000"
      AUTH_CLIENT_URL: "http://localhost:3000"
      # Uncomment to allow creating the first user via POST /v1/signup/email-password or scripts/nhost-signup-email-password.sh, then set back to "true" if desired:
      # AUTH_DISABLE_SIGNUP: "false"
